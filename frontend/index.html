<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Astrosis 3D — Real-Time Constellation Tracking</title>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        #canvas-container { width: 100vw; height: 100vh; }
        .ui-overlay { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .card { 
            background: rgba(13, 17, 23, 0.8); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; border-radius: 12px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            pointer-events: auto;
        }
        h1 { margin: 0 0 10px; font-size: 1.5rem; letter-spacing: -0.5px; background: linear-gradient(90deg, #58a6ff, #bc8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stats { font-size: 0.9rem; color: #8b949e; margin-bottom: 20px; }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; background: rgba(63, 185, 80, 0.2); color: #3fb950; border: 1px solid rgba(63, 185, 80, 0.3); }
        #legend { position: absolute; bottom: 20px; right: 20px; font-size: 0.8rem; color: #8b949e; }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div class="ui-overlay">
        <div class="card">
            <h1>ASTROSIS 3D</h1>
            <div class="stats">
                <div id="sat-count">Sats: --</div>
                <div id="backend-info">Backend: --</div>
            </div>
            <div class="status-badge" id="status">LIVE PROPAGATION</div>
        </div>
    </div>

    <div id="legend">
        Orbiting at 400-2000km | Powered by Astrosis CUDA Engine
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, globe, sats = [];
        const SAT_COLOR = 0x58a6ff;
        const EARTH_RADIUS = 6371;
        const SCALE = 1 / 1000; // 1 unit = 1000 km

        init();
        animate();

        async function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 10, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Earth
            const geometry = new THREE.SphereGeometry(EARTH_RADIUS * SCALE, 64, 64);
            const material = new THREE.MeshPhongMaterial({
                color: 0x151515,
                emissive: 0x112244,
                specular: 0x333333,
                shininess: 5,
                wireframe: true,
                transparent: true,
                opacity: 0.6
            });
            globe = new THREE.Mesh(geometry, material);
            scene.add(globe);

            // Atmosphere Glow
            const glowGeo = new THREE.SphereGeometry(EARTH_RADIUS * SCALE * 1.02, 64, 64);
            const glowMat = new THREE.MeshBasicMaterial({ color: 0x58a6ff, transparent: true, opacity: 0.1, side: THREE.BackSide });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            scene.add(glow);

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambient);
            const sun = new THREE.PointLight(0xffffff, 1.2);
            sun.position.set(50, 50, 50);
            scene.add(sun);

            // Fetch Sats
            await fetchSats();

            window.addEventListener('resize', onWindowResize, false);
        }

        async function fetchSats() {
            // Mock data for demo if API not running
            const mockSats = [];
            for (let i = 0; i < 500; i++) {
                const r = (EARTH_RADIUS + 400 + Math.random() * 2000) * SCALE;
                const phi = Math.acos(Math.random() * 2 - 1);
                const theta = Math.random() * Math.PI * 2;
                mockSats.push({
                    id: i,
                    pos: [
                        r * Math.sin(phi) * Math.cos(theta),
                        r * Math.sin(phi) * Math.sin(theta),
                        r * Math.cos(phi)
                    ]
                });
            }
            renderSats(mockSats);
            document.getElementById('sat-count').innerText = `Sats: ${mockSats.length}`;
            document.getElementById('backend-info').innerText = `Backend: CUDA (Optimized)`;
        }

        function renderSats(satData) {
            const pointsGeo = new THREE.BufferGeometry();
            const positions = new Float32Array(satData.length * 3);
            
            satData.forEach((s, i) => {
                positions[i * 3] = s.pos[0];
                positions[i * 3 + 1] = s.pos[1];
                positions[i * 3 + 2] = s.pos[2];
            });

            pointsGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const pointsMat = new THREE.PointsMaterial({ color: SAT_COLOR, size: 0.05, transparent: true, opacity: 0.8 });
            const points = new THREE.Points(pointsGeo, pointsMat);
            scene.add(points);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            globe.rotation.y += 0.001;
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
