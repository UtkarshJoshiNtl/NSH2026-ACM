<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrosis | Satellite Physics Simulator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app">

        <!-- ── Header ── -->
        <header id="header">
            <div class="brand">
                <span class="brand-prefix">Astrosis</span>
                <div class="status-dot" id="status-dot"></div>
                <span class="brand-sub">PHYSICS SIMULATOR</span>
            </div>
            <div class="header-stats">
                <div class="hstat"><span class="hlabel">SIM TIME</span><span class="hval" id="sim-time">—</span></div>
                <div class="hstat"><span class="hlabel">SATELLITES</span><span class="hval" id="h-sat-count">0</span></div>
                <div class="hstat"><span class="hlabel">DEBRIS</span><span class="hval" id="h-deb-count">0</span></div>
                <div class="hstat"><span class="hlabel">CDM</span><span class="hval" id="h-cdm-count">0</span></div>
            </div>
            <div class="header-controls">
                <button id="btn-api-key" class="ctrl-btn">🔑 API Key</button>
                <button id="btn-step" class="ctrl-btn primary">▶ +1H</button>
                <button id="btn-step-10" class="ctrl-btn">▶▶ +10H</button>
            </div>
        </header>

        <!-- ── Main Layout ── -->
        <main id="main-grid">

            <!-- Map Panel -->
            <section class="panel" id="panel-left">
                <div class="panel-tabs">
                    <button class="tab active" data-tab="map">GROUND TRACK</button>
                </div>
                <div class="tab-content active" id="tab-map">
                    <div class="canvas-wrapper">
                        <canvas id="map-canvas"></canvas>
                        <div class="map-overlay-badges">
                            <span class="badge" id="badge-sats">SAT: 0</span>
                            <span class="badge" id="badge-deb">DEB: 0</span>
                        </div>
                    </div>
                </div>
            </section>

        </main>

        <!-- ── Footer ── -->
        <footer id="footer">
            <span id="status-text">SYSTEM READY</span>
            <span class="footer-sep">|</span>
            <span>Astrosis · Satellite Physics Simulator</span>
            <span class="footer-sep">|</span>
            <span>v1.0.0</span>
        </footer>

        <!-- ── Loading Overlay ── -->
        <div id="loading-overlay" class="overlay">
            <div class="spinner"></div>
            <p>Initializing Simulation...</p>
        </div>

        <!-- API Key Modal -->
        <div id="api-key-modal" class="overlay hidden">
            <div class="modal">
                <h2>API Key Configuration</h2>
                <p>Enter your API key to access the simulation.</p>
                <input type="password" id="api-key-input" placeholder="Enter API key..." />
                <div class="modal-buttons">
                    <button id="btn-save-api-key" class="ctrl-btn primary">Save</button>
                    <button id="btn-cancel-api-key" class="ctrl-btn">Cancel</button>
                </div>
            </div>
        </div>

    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>
