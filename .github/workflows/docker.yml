name: Docker Build & Compliance

on:
  push:
    branches: [ "main", "alpha" ]
  pull_request:
    branches: [ "main", "alpha" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag acm-nsh2026:latest

    - name: Verify C++ Physics Engine (Check for .so)
      run: |
        docker run --name test-container -d acm-nsh2026:latest
        docker exec test-container ls /app/physics_engine.cpython-310-x86_64-linux-gnu.so || \
        docker exec test-container ls /app/ | grep physics_engine
        docker stop test-container
