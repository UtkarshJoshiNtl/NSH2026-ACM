name: CI

on:
  push:
    branches: [main, develop, theta]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest flake8
    - name: Lint
      run: flake8 engine/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Run tests
      run: python -m pytest tests/test_correctness.py -v

  build-cpp:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install tools
      run: sudo apt-get update && sudo apt-get install -y cmake g++
    - name: Build C++ engine
      run: |
        cd cpp && mkdir -p build && cd build
        cmake .. -DUSE_CUDA=OFF
        make -j$(nproc)
