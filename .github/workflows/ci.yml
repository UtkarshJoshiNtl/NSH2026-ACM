name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install deps
      run: |
        pip install -r requirements.txt
        pip install pytest flake8 black mypy

    - name: Lint
      run: |
        flake8 engine/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 engine/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Format check
      run: black --check engine/

    - name: Type check
      run: mypy engine/ --ignore-missing-imports || true

    - name: Run tests
      run: pytest tests/ -v

  build-cpp:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build C++ module
      run: |
        sudo apt-get install -y cmake g++
        cd cpp && mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
